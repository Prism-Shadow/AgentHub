name: Publish to PyPI and npm

on:
  release:
    types:
      - published

jobs:
  publish-pypi:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          github-token: ${{ github.token }}

      - name: Build package
        working-directory: ./src_py
        run: uv build

      - name: Publish to PyPI
        working-directory: ./src_py
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: Publish TypeScript package to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: "./src_ts/package-lock.json"

      - name: Install dependencies
        working-directory: ./src_ts
        run: npm ci

      - name: Build package
        working-directory: ./src_ts
        run: npm run build

      - name: Publish to npm
        working-directory: ./src_ts
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
